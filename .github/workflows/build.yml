name: Build and Push Trojan Docker Image

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1  # Updated

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0  # Updated
        with:
          username: ${{ secrets.DOCKER_HUB_VIRGOZKI }}
          password: ${{ secrets.DOCKER_HUB_RAFAELRAGOS }}  # ✅ DAPAT PASSWORD, HINDI TOKEN

      - name: Build and Push
        uses: docker/build-push-action@v6.5.0  # Updated
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_VIRGOZKI }}/trojan-server:latest

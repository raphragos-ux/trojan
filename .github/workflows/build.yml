name: Build and Push Trojan Docker Image

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: I-checkout ang code
        uses: actions/checkout@v4

      - name: I-setup ang Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mag-login sa Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_RAFAELRAGOS }}
          password: ${{ secrets.DOCKER_HUB_dckr_pat_lIf2CkEf8Ma8NdAAesOHzvGQbFM }}

      - name: Magbuo at Mag-push sa Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_RAFAELRAGOS }}/trojan-server:latest

